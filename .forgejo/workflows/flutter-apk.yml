name: Flutter APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: agent-credmint-macos-intel-direct

    steps:
      - name: Prepare repository
        run: |
          set -e
          rm -rf /tmp/winterplan-ci
          git clone --depth 1 ssh://git@192.168.6.10:222/enoch/winterplan.git /tmp/winterplan-ci
          cd /tmp/winterplan-ci
          git rev-parse HEAD

      - name: Install dependencies
        run: |
          cd /tmp/winterplan-ci
          flutter pub get

      - name: Analyze code
        run: |
          cd /tmp/winterplan-ci
          flutter analyze

      - name: Run tests
        run: |
          cd /tmp/winterplan-ci
          flutter test

      - name: Build debug APK
        run: |
          cd /tmp/winterplan-ci
          flutter build apk --debug

      - name: Show APK path
        run: |
          ls -lh /tmp/winterplan-ci/build/app/outputs/flutter-apk/app-debug.apk
